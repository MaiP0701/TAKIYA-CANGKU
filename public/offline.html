<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>离线中</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #fffaf1 0%, #fff3df 100%);
        color: #2d2317;
        font-family: "PingFang SC", "Noto Sans CJK SC", sans-serif;
      }
      main {
        max-width: 420px;
        padding: 32px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 18px 40px rgba(114, 74, 27, 0.12);
        text-align: center;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        margin: 0;
        line-height: 1.8;
        color: #6b5a46;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>当前网络不可用</h1>
      <p>应用的基础资源已缓存。请在网络恢复后重新加载页面，再继续进行库存操作。</p>
    </main>
  </body>
</html>
